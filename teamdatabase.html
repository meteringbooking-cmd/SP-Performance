<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Database - Scottish Power</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #005EB8;
            --primary-dark: #003d7a;
            --accent: #00A3E0;
            --bg-dark: #0A1628;
            --bg-card: #1a2942;
            --text-light: #E8EDF2;
            --text-muted: #8B9AAE;
            --border: #2a3f5f;
            --success: #10B981;
            --warning: #F59E0B;
            --error: #EF4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Work Sans', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #0d1f3a 100%);
            color: var(--text-light);
            min-height: 100vh;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(0,163,224,0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0,94,184,0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container { max-width: 900px; margin: 0 auto; position: relative; z-index: 1; }

        /* ── HEADER ── */
        header { margin-bottom: 3rem; animation: slideDown 0.6s ease-out; }
        @keyframes slideDown { from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);} }

        .header-content { display:flex; align-items:center; gap:1.5rem; margin-bottom:1rem; }

        .back-btn {
            width:48px; height:48px; background:var(--bg-card);
            border:1px solid var(--border); border-radius:12px;
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; transition:all 0.3s ease;
            text-decoration:none; color:var(--text-light); font-size:1.25rem;
        }
        .back-btn:hover { background:var(--primary); border-color:var(--accent); transform:translateX(-4px); }

        h1 {
            font-size:2.25rem; font-weight:700; letter-spacing:-0.02em;
            background:linear-gradient(135deg,var(--text-light) 0%,var(--accent) 100%);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
        }
        .subtitle { font-family:'DM Mono',monospace; color:var(--text-muted); font-size:0.95rem; margin-left:64px; letter-spacing:0.05em; }

        /* ── CARD ── */
        .card {
            background:var(--bg-card); border:1px solid var(--border);
            border-radius:16px; padding:2.5rem; margin-bottom:2rem;
            animation:fadeInUp 0.6s ease-out;
        }
        @keyframes fadeInUp { from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);} }

        .card-title {
            font-size:1.2rem; font-weight:700; margin-bottom:1.5rem;
            color:var(--accent); display:flex; align-items:center; gap:0.5rem;
        }

        /* ── FORM ── */
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; margin-bottom:1.5rem; }

        .form-group { display:flex; flex-direction:column; gap:0.6rem; }

        label { font-weight:600; font-size:0.95rem; color:var(--text-light); }

        input[type="text"] {
            width:100%; padding:1rem;
            background:var(--bg-dark); border:2px solid var(--border);
            border-radius:12px; color:var(--text-light);
            font-family:'Work Sans',sans-serif; font-size:1rem;
            transition:all 0.3s ease;
        }
        input[type="text"]:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 4px rgba(0,163,224,0.1); }
        input[type="text"]::placeholder { color:var(--text-muted); }

        /* ── BUTTONS ── */
        .btn-group { display:flex; gap:1rem; margin-top:0.5rem; }

        .btn {
            padding:1rem 2rem; border:none; border-radius:12px;
            font-weight:600; font-size:1rem; cursor:pointer;
            transition:all 0.3s ease; font-family:'Work Sans',sans-serif;
        }
        .btn-primary {
            background:linear-gradient(135deg,var(--primary) 0%,var(--accent) 100%);
            color:white; flex:1;
        }
        .btn-primary:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 12px 24px rgba(0,163,224,0.3); }
        .btn-primary:disabled { opacity:0.5; cursor:not-allowed; }
        .btn-secondary {
            background:var(--bg-dark); color:var(--text-light);
            border:2px solid var(--border);
        }
        .btn-secondary:hover { border-color:var(--accent); background:var(--bg-card); }

        /* ── MESSAGES ── */
        .success-message, .error-message {
            display:none; padding:1.2rem 1.5rem;
            border-radius:12px; font-weight:600; margin-bottom:1.5rem;
            animation:fadeInUp 0.4s ease-out;
        }
        .success-message { background:rgba(16,185,129,0.1); border:2px solid var(--success); color:var(--success); }
        .error-message   { background:rgba(239,68,68,0.1);   border:2px solid var(--error);   color:var(--error); }
        .success-message.show, .error-message.show { display:block; }

        /* ── STATS BAR ── */
        .stats-bar {
            display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
            gap:1rem; margin-bottom:2rem;
        }
        .stat-card {
            background:var(--bg-card); border:1px solid var(--border);
            border-radius:12px; padding:1rem 1.2rem;
        }
        .stat-lbl { font-family:'DM Mono',monospace; font-size:0.72rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.07em; margin-bottom:0.3rem; }
        .stat-val { font-size:1.8rem; font-weight:700; color:var(--accent); }

        /* ── SEARCH / FILTER ── */
        .filter-row {
            display:flex; gap:1rem; margin-bottom:1.5rem; flex-wrap:wrap; align-items:center;
        }
        .search-input {
            flex:1; min-width:200px; padding:0.75rem 1rem;
            background:var(--bg-dark); border:2px solid var(--border);
            border-radius:10px; color:var(--text-light);
            font-family:'Work Sans',sans-serif; font-size:0.95rem;
            transition:border-color 0.2s;
        }
        .search-input:focus { outline:none; border-color:var(--accent); }
        .search-input::placeholder { color:var(--text-muted); }

        select.filter-select {
            padding:0.75rem 1rem;
            background:var(--bg-dark); border:2px solid var(--border);
            border-radius:10px; color:var(--text-light);
            font-family:'Work Sans',sans-serif; font-size:0.95rem;
            transition:border-color 0.2s; cursor:pointer;
        }
        select.filter-select:focus { outline:none; border-color:var(--accent); }
        select.filter-select option { background:var(--bg-card); }

        /* ── TABLE ── */
        .table-wrapper {
            overflow-x:auto; border-radius:12px; border:1px solid var(--border);
        }
        table { width:100%; border-collapse:collapse; background:var(--bg-dark); }
        thead { background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%); }
        th {
            padding:1rem; text-align:left; font-weight:600;
            font-size:0.85rem; letter-spacing:0.05em; text-transform:uppercase; white-space:nowrap;
        }
        td { padding:1rem; border-bottom:1px solid var(--border); font-size:0.95rem; }
        tbody tr { transition:background 0.2s; }
        tbody tr:hover { background:rgba(0,163,224,0.05); }
        tbody tr:last-child td { border-bottom:none; }

        .tag {
            display:inline-block; padding:0.2rem 0.65rem;
            border-radius:20px; font-size:0.78rem; font-weight:600;
        }
        .tag-engineer { background:rgba(0,163,224,0.12); color:var(--accent); border:1px solid rgba(0,163,224,0.3); }
        .tag-leader   { background:rgba(245,158,11,0.12); color:var(--warning); border:1px solid rgba(245,158,11,0.3); }

        .delete-btn {
            background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3);
            color:var(--error); padding:0.3rem 0.75rem; border-radius:7px;
            font-size:0.8rem; font-weight:600; cursor:pointer; transition:all 0.2s;
        }
        .delete-btn:hover { background:rgba(239,68,68,0.2); border-color:var(--error); }

        .empty-state {
            text-align:center; padding:3rem 2rem; color:var(--text-muted);
            font-family:'DM Mono',monospace; font-size:0.9rem;
        }
        .empty-state .icon { font-size:2.5rem; margin-bottom:0.75rem; }

        .loading-row td {
            text-align:center; color:var(--text-muted);
            font-family:'DM Mono',monospace; font-size:0.88rem; padding:2rem;
        }

        .added-at { font-family:'DM Mono',monospace; font-size:0.78rem; color:var(--text-muted); }

        @media(max-width:650px) {
            body { padding:1rem; }
            .card { padding:1.5rem; }
            h1 { font-size:1.75rem; }
            .subtitle { margin-left:0; margin-top:0.5rem; }
            .form-row { grid-template-columns:1fr; }
            .btn-group { flex-direction:column; }
        }
    </style>
</head>
<body>
<div class="container">

    <header>
        <div class="header-content">
            <a href="index.html" class="back-btn">←</a>
            <h1>Team Database</h1>
        </div>
        <p class="subtitle">MANAGE ENGINEERS & TEAM LEADERS</p>
    </header>

    <!-- Messages -->
    <div id="successMessage" class="success-message"></div>
    <div id="errorMessage"   class="error-message"></div>

    <!-- Add Entry Form -->
    <div class="card">
        <div class="card-title">➕ Add Team Member</div>
        <div class="form-row">
            <div class="form-group">
                <label for="engineerInput">Engineer Name</label>
                <input type="text" id="engineerInput" placeholder="e.g. John Smith">
            </div>
            <div class="form-group">
                <label for="leaderInput">Team Leader Name</label>
                <input type="text" id="leaderInput" placeholder="e.g. Sarah Jones">
            </div>
        </div>
        <div class="btn-group">
            <button class="btn btn-secondary" id="clearBtn">Clear</button>
            <button class="btn btn-primary" id="addBtn">Add to Database</button>
        </div>
    </div>

    <!-- Stats -->
    <div class="stats-bar">
        <div class="stat-card"><div class="stat-lbl">Total Entries</div><div class="stat-val" id="stat-total">—</div></div>
        <div class="stat-card"><div class="stat-lbl">Engineers</div><div class="stat-val" id="stat-engineers">—</div></div>
        <div class="stat-card"><div class="stat-lbl">Team Leaders</div><div class="stat-val" id="stat-leaders">—</div></div>
    </div>

    <!-- Records Table -->
    <div class="card">
        <div class="card-title">👥 Team Records</div>

        <div class="filter-row">
            <input type="text" class="search-input" id="searchInput" placeholder="Search by name…">
            <select class="filter-select" id="filterSelect">
                <option value="">All Records</option>
                <option value="engineer">By Engineer</option>
                <option value="leader">By Team Leader</option>
            </select>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Engineer Name</th>
                        <th>Team Leader</th>
                        <th>Added</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="teamTableBody">
                    <tr class="loading-row"><td colspan="4">⏳ Loading records…</td></tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, serverTimestamp, orderBy, query }
    from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const app = initializeApp({
    apiKey:            "AIzaSyCMmUOdW2uEIGVd6XQfWXKF8eaFmwEog1g",
    authDomain:        "oesperformance-a54c0.firebaseapp.com",
    projectId:         "oesperformance-a54c0",
    storageBucket:     "oesperformance-a54c0.firebasestorage.app",
    messagingSenderId: "484894102454",
    appId:             "1:484894102454:web:17535ee497eac2d90d6717"
});
const db = getFirestore(app);

let allRecords = [];

// ── DOM refs ──────────────────────────────────────────────────────────────
const engineerInput  = document.getElementById('engineerInput');
const leaderInput    = document.getElementById('leaderInput');
const addBtn         = document.getElementById('addBtn');
const clearBtn       = document.getElementById('clearBtn');
const searchInput    = document.getElementById('searchInput');
const filterSelect   = document.getElementById('filterSelect');
const tableBody      = document.getElementById('teamTableBody');
const successMessage = document.getElementById('successMessage');
const errorMessage   = document.getElementById('errorMessage');

// ── Load records ──────────────────────────────────────────────────────────
async function loadRecords() {
    try {
        const snap = await getDocs(query(collection(db, 'SP - Teams'), orderBy('addedAt', 'desc')));
        allRecords = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        updateStats();
        renderTable();
    } catch(e) {
        tableBody.innerHTML = `<tr class="loading-row"><td colspan="4">⚠️ Error loading records: ${esc(e.message)}</td></tr>`;
    }
}

// ── Add record ────────────────────────────────────────────────────────────
addBtn.addEventListener('click', async () => {
    const engineer = engineerInput.value.trim();
    const leader   = leaderInput.value.trim();

    if (!engineer || !leader) {
        showMsg('error', '✗ Please enter both an engineer name and a team leader name.');
        return;
    }

    addBtn.disabled = true;
    addBtn.textContent = 'Adding…';
    hideMessages();

    try {
        const docRef = await addDoc(collection(db, 'SP - Teams'), {
            engineerName: engineer,
            teamLeader:   leader,
            addedAt:      serverTimestamp()
        });

        allRecords.unshift({ id: docRef.id, engineerName: engineer, teamLeader: leader, addedAt: { toDate: () => new Date() } });
        updateStats();
        renderTable();

        engineerInput.value = '';
        leaderInput.value   = '';
        showMsg('success', `✓ ${engineer} added to the team database.`);
    } catch(e) {
        showMsg('error', '✗ Error saving record: ' + e.message);
    } finally {
        addBtn.disabled    = false;
        addBtn.textContent = 'Add to Database';
    }
});

// ── Delete record ─────────────────────────────────────────────────────────
window.deleteRecord = async function(id, name) {
    if (!confirm(`Remove "${name}" from the database?`)) return;
    try {
        await deleteDoc(doc(db, 'SP - Teams', id));
        allRecords = allRecords.filter(r => r.id !== id);
        updateStats();
        renderTable();
        showMsg('success', `✓ ${name} removed from the database.`);
    } catch(e) {
        showMsg('error', '✗ Error deleting record: ' + e.message);
    }
};

// ── Clear form ────────────────────────────────────────────────────────────
clearBtn.addEventListener('click', () => {
    engineerInput.value = '';
    leaderInput.value   = '';
    hideMessages();
    engineerInput.focus();
});

// ── Enter key support ─────────────────────────────────────────────────────
leaderInput.addEventListener('keydown', e => { if (e.key === 'Enter') addBtn.click(); });
engineerInput.addEventListener('keydown', e => { if (e.key === 'Enter') leaderInput.focus(); });

// ── Filter / search ───────────────────────────────────────────────────────
searchInput.addEventListener('input', renderTable);
filterSelect.addEventListener('change', renderTable);

// ── Render table ──────────────────────────────────────────────────────────
function renderTable() {
    const search = searchInput.value.trim().toLowerCase();
    const filter = filterSelect.value;

    let filtered = allRecords.filter(r => {
        const matchSearch = !search ||
            r.engineerName?.toLowerCase().includes(search) ||
            r.teamLeader?.toLowerCase().includes(search);
        return matchSearch;
    });

    if (!filtered.length) {
        tableBody.innerHTML = `<tr><td colspan="4"><div class="empty-state"><div class="icon">👥</div>No records found</div></td></tr>`;
        return;
    }

    // Sort by engineer or leader if filter selected
    if (filter === 'engineer') filtered.sort((a,b) => (a.engineerName||'').localeCompare(b.engineerName||''));
    if (filter === 'leader')   filtered.sort((a,b) => (a.teamLeader||'').localeCompare(b.teamLeader||''));

    tableBody.innerHTML = filtered.map(r => {
        const date = r.addedAt?.toDate ? r.addedAt.toDate().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '—';
        return `<tr>
            <td><span class="tag tag-engineer">👷 ${esc(r.engineerName || '—')}</span></td>
            <td><span class="tag tag-leader">⭐ ${esc(r.teamLeader || '—')}</span></td>
            <td><span class="added-at">${date}</span></td>
            <td><button class="delete-btn" onclick="deleteRecord('${esc(r.id)}','${esc(r.engineerName || '')}')">Remove</button></td>
        </tr>`;
    }).join('');
}

// ── Stats ─────────────────────────────────────────────────────────────────
function updateStats() {
    const leaders = [...new Set(allRecords.map(r => r.teamLeader).filter(Boolean))];
    document.getElementById('stat-total').textContent     = allRecords.length;
    document.getElementById('stat-engineers').textContent = allRecords.length;
    document.getElementById('stat-leaders').textContent   = leaders.length;
}

// ── Messages ──────────────────────────────────────────────────────────────
function showMsg(type, msg) {
    hideMessages();
    const el = type === 'success' ? successMessage : errorMessage;
    el.textContent = msg;
    el.classList.add('show');
    el.scrollIntoView({ behavior:'smooth', block:'nearest' });
    setTimeout(() => el.classList.remove('show'), 4000);
}
function hideMessages() {
    successMessage.classList.remove('show');
    errorMessage.classList.remove('show');
}

// ── Utils ─────────────────────────────────────────────────────────────────
function esc(t) {
    const d = document.createElement('div');
    d.textContent = String(t ?? '');
    return d.innerHTML;
}

// ── Boot ──────────────────────────────────────────────────────────────────
loadRecords();
</script>
</body>
</html>
