<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jobs Completed &bull; SP</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --bg: #0f172a; --card: #1e293b; --accent: #10b981; --accent2: #3b82f6;
      --text: #e2e8f0; --text-dim: #94a3b8; --border: #334155; --error: #f87171; --warning: #f59e0b;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: grid; grid-template-columns: 290px 1fr; }

    aside { background: var(--card); border-right: 1px solid var(--border); padding: 2rem 1.5rem; height: 100vh; position: sticky; top: 0; overflow-y: auto; }
    .logo { font-size: 1.5rem; font-weight: 700; background: linear-gradient(90deg, var(--accent), #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; text-align: center; }
    .logo-sub { text-align: center; font-size: 0.75rem; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 2rem; }
    .sidebar-section-title { font-size: 0.78rem; color: var(--text-dim); margin: 1.6rem 0 0.7rem; text-transform: uppercase; letter-spacing: 0.07em; font-weight: 700; }

    .period-btn, .team-btn { display: block; width: 100%; padding: 0.85rem 1.1rem; margin: 0.35rem 0; background: transparent; border: 1px solid var(--border); border-radius: 10px; color: var(--text); text-align: left; cursor: pointer; transition: all 0.18s ease; font-size: 0.9rem; font-family: inherit; }
    .period-btn:hover, .team-btn:hover { background: rgba(16,185,129,0.08); border-color: var(--accent); }
    .period-btn.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 3px 12px rgba(16,185,129,0.3); font-weight: 600; }
    .team-btn.active { background: rgba(16,185,129,0.2); color: white; font-weight: 600; border-color: var(--accent); }

    /* Day pills */
    .day-pills { display: none; gap: 0.35rem; flex-direction: column; margin-top: 0.5rem; }
    .day-pills.visible { display: flex; }
    .day-pill-btn { display: block; width: 100%; padding: 0.65rem 1rem; background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--text-dim); font-size: 0.82rem; font-weight: 600; cursor: pointer; text-align: left; transition: all 0.15s; font-family: inherit; }
    .day-pill-btn:hover { background: rgba(16,185,129,0.08); border-color: var(--accent); color: var(--text); }
    .day-pill-btn.active { background: rgba(16,185,129,0.25); border-color: var(--accent); color: white; }

    /* Month picker */
    .month-picker { display: none; margin-top: 0.5rem; }
    .month-picker.visible { display: block; }
    .month-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.35rem; margin-top: 0.5rem; }
    .month-cell { padding: 0.5rem 0.3rem; background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--text-dim); font-size: 0.8rem; font-family: inherit; cursor: pointer; text-align: center; transition: all 0.15s; }
    .month-cell:hover { background: rgba(16,185,129,0.1); border-color: var(--accent); color: var(--text); }
    .month-cell.active { background: rgba(16,185,129,0.25); border-color: var(--accent); color: white; font-weight: 600; }
    .month-cell.disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }
    .year-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.4rem; }
    .year-nav span { font-size: 0.88rem; color: var(--text); font-weight: 600; }
    .year-btn { background: transparent; border: 1px solid var(--border); border-radius: 6px; color: var(--text-dim); cursor: pointer; padding: 0.25rem 0.6rem; font-size: 0.8rem; transition: all 0.15s; font-family: inherit; }
    .year-btn:hover { border-color: var(--accent); color: var(--text); }

    .team-loading { color: var(--text-dim); font-size: 0.82rem; padding: 0.5rem 0; font-style: italic; }
    .team-btn-wrap { position: relative; }
    .team-btn .tl-chevron { float: right; font-size: 0.7rem; transition: transform 0.22s; color: rgba(255,255,255,0.5); margin-top: 2px; }
    .team-btn.active .tl-chevron { color: white; }
    .team-btn.expanded .tl-chevron { transform: rotate(180deg); }
    .engineer-list { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; margin-left: 0.5rem; }
    .engineer-list.open { max-height: 600px; }
    .eng-btn { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 0.55rem 0.9rem; margin: 0.2rem 0; background: transparent; border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; color: var(--text-dim); text-align: left; cursor: pointer; transition: all 0.15s; font-size: 0.82rem; font-family: inherit; }
    .eng-btn:hover { background: rgba(16,185,129,0.07); color: var(--text); border-color: rgba(16,185,129,0.3); }
    .eng-btn.active { background: rgba(16,185,129,0.15); color: white; border-color: var(--accent); font-weight: 600; }
    .eng-pct { font-size: 0.72rem; font-weight: 700; padding: 0.1rem 0.45rem; border-radius: 10px; background: rgba(255,255,255,0.08); color: var(--text-dim); flex-shrink: 0; margin-left: 0.4rem; }
    .eng-btn.active .eng-pct { background: rgba(16,185,129,0.25); color: var(--accent); }

    main { padding: 2.5rem 3rem; overflow-y: auto; }
    header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2rem; gap: 1.5rem; flex-wrap: wrap; }
    .header-left h1 { font-size: 2.1rem; font-weight: 700; background: linear-gradient(90deg, #e2e8f0, #d1d5db); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.25rem; }
    .header-left p { color: var(--text-dim); font-size: 0.88rem; }

    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-box { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 1.2rem 1.4rem; transition: border-color 0.2s; }
    .stat-box:hover { border-color: var(--accent); }
    .stat-box .lbl { font-size: 0.72rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 0.4rem; font-weight: 600; }
    .stat-box .val { font-size: 2rem; font-weight: 700; line-height: 1; }
    .val-green  { background: linear-gradient(90deg, var(--accent), #34d399); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .val-blue   { background: linear-gradient(90deg, #60a5fa, #93c5fd); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .val-amber  { background: linear-gradient(90deg, #f59e0b, #fbbf24); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .val-purple { background: linear-gradient(90deg, #a78bfa, #c4b5fd); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

    .card { background: var(--card); border-radius: 16px; border: 1px solid var(--border); padding: 1.8rem 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.35); margin-bottom: 2rem; }
    .card-title { font-size: 1rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 1.2rem; }
    #chartContainer { height: 420px; position: relative; }
    .overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--text-dim); font-size: 1.1rem; background: rgba(15,23,42,0.5); border-radius: 10px; z-index: 10; flex-direction: column; gap: 0.75rem; }
    .overlay.error { color: var(--error); font-weight: 500; text-align: center; padding: 2rem; }
    .spinner-sm { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .table-wrapper { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); margin-top: 0.5rem; }
    table { width: 100%; border-collapse: collapse; background: var(--bg); font-size: 0.9rem; }
    thead { background: linear-gradient(135deg, #005EB8 0%, #003d7a 100%); }
    th { padding: 0.9rem 1rem; text-align: left; font-weight: 600; font-size: 0.8rem; letter-spacing: 0.05em; text-transform: uppercase; white-space: nowrap; }
    td { padding: 0.85rem 1rem; border-bottom: 1px solid var(--border); }
    tbody tr { transition: background 0.15s; }
    tbody tr:hover { background: rgba(16,185,129,0.05); }
    tbody tr:last-child td { border-bottom: none; }
    .badge { display: inline-block; padding: 0.18rem 0.6rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .badge-green { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
    .badge-blue  { background: rgba(96,165,250,0.15); color: #93c5fd; border: 1px solid rgba(96,165,250,0.3); }
    .badge-amber { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
    .empty-table { text-align: center; padding: 2.5rem; color: var(--text-dim); font-style: italic; }

    .toggle-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .type-toggle { padding: 0.4rem 0.9rem; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all 0.15s; font-family: inherit; }
    .type-toggle:hover { border-color: var(--accent); color: var(--text); }
    .type-toggle.active { background: var(--accent); border-color: var(--accent); color: white; }

    @media (max-width: 1100px) { body { grid-template-columns: 1fr; } aside { height: auto; position: relative; border-right: none; border-bottom: 1px solid var(--border); } main { padding: 1.5rem; } header { flex-direction: column; } }
  </style>
</head>
<body>

<aside>
  <div class="logo">SP</div>
  <div class="logo-sub">Jobs Completed</div>

  <div class="sidebar-section-title">Time Period</div>
  <button class="period-btn" data-period="prevdays">Previous 5 Days</button>
  <div class="day-pills" id="dayPills"></div>
  <button class="period-btn active" data-period="7days">Last 7 days</button>
  <button class="period-btn" data-period="4weeks">Last 4 weeks</button>
  <button class="period-btn" data-period="6months">Last 6 months</button>
  <button class="period-btn" data-period="year">Year to date</button>
  <button class="period-btn" data-period="specificMonth">Specific Month&hellip;</button>

  <!-- Month picker -->
  <div class="month-picker" id="monthPicker">
    <div class="year-nav">
      <button class="year-btn" id="yearPrev">&lsaquo;</button>
      <span id="yearLabel">2025</span>
      <button class="year-btn" id="yearNext">&rsaquo;</button>
    </div>
    <div class="month-grid" id="monthGrid"></div>
  </div>

  <div class="sidebar-section-title">Team Leader</div>
  <button class="team-btn active" data-team="all">All Teams</button>
  <div id="teamLeaderBtns"><div class="team-loading">Loading teams&hellip;</div></div>
</aside>

<main>
  <header>
    <div class="header-left">
      <h1>Jobs Completed</h1>
      <p id="subtitle">Showing all teams &mdash; last 7 days</p>
    </div>
  </header>

  <div class="stats-row">
    <div class="stat-box"><div class="lbl">Total Jobs</div><div class="val val-green" id="stat-total">&mdash;</div></div>
    <div class="stat-box"><div class="lbl">Completed</div><div class="val val-blue" id="stat-completed">&mdash;</div></div>
    <div class="stat-box"><div class="lbl">Completion %</div><div class="val val-amber" id="stat-pct">&mdash;</div></div>
    <div class="stat-box"><div class="lbl">Engineers</div><div class="val val-purple" id="stat-engineers">&mdash;</div></div>
  </div>

  <div class="toggle-row" id="jobTypeToggles">
    <button class="type-toggle active" data-type="all">All Job Types</button>
  </div>

  <div class="card">
    <div class="card-title" id="chartTitle">Jobs Over Time</div>
    <div id="chartContainer">
      <div class="overlay"><div class="spinner-sm"></div><span>Loading&hellip;</span></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Engineer Breakdown</div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr><th>Engineer</th><th>Team Leader</th><th>Total Jobs</th><th>Completed</th><th>Completion %</th><th>Job Type</th></tr>
        </thead>
        <tbody id="breakdownBody">
          <tr><td colspan="6" class="empty-table">Loading&hellip;</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, orderBy }
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:            "AIzaSyCMmUOdW2uEIGVd6XQfWXKF8eaFmwEog1g",
  authDomain:        "oesperformance-a54c0.firebaseapp.com",
  projectId:         "oesperformance-a54c0",
  storageBucket:     "oesperformance-a54c0.firebasestorage.app",
  messagingSenderId: "484894102454",
  appId:             "1:484894102454:web:17535ee497eac2d90d6717"
});
const db = getFirestore(app);

const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTH_LONG  = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS_SHORT  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DAYS_LONG   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const TODAY = new Date();

let currentPeriod    = '7days';
let currentTeam      = 'all';
let currentJobType   = 'all';
let currentEngineer  = 'all';
let currentDayIndex  = 0;   // for prevdays mode
let teamMap          = {};
let engineerDisplayMap = {};
let allTeamLeaders   = [];
let chart            = null;
let pickerYear       = TODAY.getFullYear();
let pickerMonth      = null;

const canvas = document.createElement('canvas');
document.getElementById('chartContainer').appendChild(canvas);

// ── Working day helpers ────────────────────────────────────────────────────
function getNthPreviousWorkingDay(n) {
  let d = new Date(); let count = 0;
  while (count < n) { d.setDate(d.getDate() - 1); if (d.getDay() !== 0 && d.getDay() !== 6) count++; }
  return d;
}
function fmtISO(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function fmtShort(d) { return `${DAYS_SHORT[d.getDay()]} ${d.getDate()} ${MONTH_NAMES[d.getMonth()]}`; }
function fmtLong(d)  { return `${DAYS_LONG[d.getDay()]}, ${d.getDate()} ${MONTH_LONG[d.getMonth()]} ${d.getFullYear()}`; }

// Pre-compute the 5 previous working days
const prevWorkingDays = Array.from({ length: 5 }, (_, i) => getNthPreviousWorkingDay(i + 1));

// ── Build the day pills in sidebar ────────────────────────────────────────
function buildDayPills() {
  const container = document.getElementById('dayPills');
  container.innerHTML = prevWorkingDays.map((d, i) =>
    `<button class="day-pill-btn${i === currentDayIndex && currentPeriod === 'prevdays' ? ' active' : ''}" data-idx="${i}">
      ${i === 0 ? '&#8592; ' : ''}${fmtShort(d)}${i === 0 ? ' (latest)' : ''}
    </button>`
  ).join('');
  container.querySelectorAll('.day-pill-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentDayIndex = parseInt(btn.dataset.idx);
      currentPeriod   = 'prevdays';
      // Activate prevdays period button
      document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('.period-btn[data-period="prevdays"]').classList.add('active');
      document.getElementById('monthPicker').classList.remove('visible');
      // Mark correct pill
      container.querySelectorAll('.day-pill-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      refresh();
    });
  });
}

const periods = {
  '7days':   { daysBack: 7,   groupBy: 'day',   chartType: 'bar',  label: 'Last 7 days' },
  '4weeks':  { daysBack: 28,  groupBy: 'day',   chartType: 'bar',  label: 'Last 4 weeks' },
  '6months': { daysBack: 180, groupBy: 'month', chartType: 'bar',  label: 'Last 6 months' },
  'year':    { daysBack: 365, groupBy: 'week',  chartType: 'line', label: 'Year to date' },
};

// ── Month picker ──────────────────────────────────────────────────────────
function renderMonthGrid() {
  const grid = document.getElementById('monthGrid');
  grid.innerHTML = MONTH_NAMES.map((name, i) => {
    const isFuture = pickerYear > TODAY.getFullYear() ||
                     (pickerYear === TODAY.getFullYear() && i > TODAY.getMonth());
    const isActive = i === pickerMonth && currentPeriod === 'specificMonth';
    return `<button class="month-cell${isActive?' active':''}${isFuture?' disabled':''}" data-month="${i}">${name}</button>`;
  }).join('');
  grid.querySelectorAll('.month-cell:not(.disabled)').forEach(btn => {
    btn.addEventListener('click', () => { pickerMonth = parseInt(btn.dataset.month); renderMonthGrid(); refresh(); });
  });
}
document.getElementById('yearLabel').textContent = pickerYear;
document.getElementById('yearPrev').addEventListener('click', () => {
  if (pickerYear > TODAY.getFullYear() - 5) { pickerYear--; document.getElementById('yearLabel').textContent = pickerYear; renderMonthGrid(); }
});
document.getElementById('yearNext').addEventListener('click', () => {
  if (pickerYear < TODAY.getFullYear()) { pickerYear++; document.getElementById('yearLabel').textContent = pickerYear; renderMonthGrid(); }
});
renderMonthGrid();

// ── Team loading ──────────────────────────────────────────────────────────
async function loadTeamLeaders() {
  try {
    const snap = await getDocs(collection(db, 'SP - Teams'));
    teamMap = {};
    const leaders = new Set();
    snap.docs.forEach(d => {
      const data = d.data();
      if (data.engineerName && data.teamLeader) {
        const key = data.engineerName.trim().toLowerCase();
        teamMap[key] = data.teamLeader.trim();
        engineerDisplayMap[key] = data.engineerName.trim();
        leaders.add(data.teamLeader.trim());
      }
    });
    allTeamLeaders = [...leaders].sort();
    renderTeamButtons();
  } catch(e) {
    document.getElementById('teamLeaderBtns').innerHTML = '<div class="team-loading">Failed to load teams</div>';
  }
}

function renderTeamButtons() {
  const container = document.getElementById('teamLeaderBtns');
  const byLeader = {};
  Object.entries(teamMap).forEach(([engLower, tl]) => {
    if (!byLeader[tl]) byLeader[tl] = [];
    byLeader[tl].push(engineerDisplayMap[engLower] || engLower);
  });
  container.innerHTML = allTeamLeaders.map(tl => {
    const engineers = (byLeader[tl] || []).sort();
    return `<div class="team-btn-wrap">
      <button class="team-btn" data-team="${esc(tl)}">${esc(tl)}<span class="tl-chevron">&#9660;</span></button>
      <div class="engineer-list" id="englist-${esc(tl.replace(/\s+/g,'-'))}">
        ${engineers.map(eng => `
          <button class="eng-btn" data-engineer="${esc(eng)}" data-team="${esc(tl)}">
            <span class="eng-name">${esc(eng)}</span>
            <span class="eng-pct" id="engpct-${esc(eng.replace(/\s+/g,'-'))}">&#8212;</span>
          </button>`).join('')}
      </div>
    </div>`;
  }).join('');

  container.querySelectorAll('.team-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const tl     = btn.dataset.team;
      const listId = 'englist-' + tl.replace(/\s+/g,'-');
      const list   = document.getElementById(listId);
      const isOpen = list.classList.contains('open');
      if (currentTeam === tl && isOpen) {
        list.classList.remove('open'); btn.classList.remove('expanded');
        document.querySelectorAll('.team-btn, .eng-btn').forEach(b => b.classList.remove('active'));
        document.querySelector('.team-btn[data-team="all"]').classList.add('active');
        currentTeam = 'all'; currentEngineer = 'all'; refresh(); return;
      }
      container.querySelectorAll('.engineer-list').forEach(l => l.classList.remove('open'));
      container.querySelectorAll('.team-btn').forEach(b => b.classList.remove('active','expanded'));
      container.querySelectorAll('.eng-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('.team-btn[data-team="all"]').classList.remove('active');
      list.classList.add('open'); btn.classList.add('active','expanded');
      currentTeam = tl; currentEngineer = 'all'; refresh();
    });
  });

  container.querySelectorAll('.eng-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      container.querySelectorAll('.eng-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentTeam     = btn.dataset.team;
      currentEngineer = btn.dataset.engineer;
      container.querySelectorAll('.team-btn').forEach(b => b.classList.remove('active'));
      container.querySelector(`.team-btn[data-team="${CSS.escape(btn.dataset.team)}"]`)?.classList.add('active');
      refresh();
    });
  });
}

function updateEngineerBadges(jobs) {
  const byEng = {};
  jobs.forEach(j => {
    const eng = (j.outcomeResource || '').trim();
    if (!eng) return;
    if (!byEng[eng]) byEng[eng] = { total: 0, completed: 0 };
    if (isCountable(j)) { byEng[eng].total++; if (isCompleted(j)) byEng[eng].completed++; }
  });
  Object.entries(byEng).forEach(([eng, d]) => {
    const el = document.getElementById('engpct-' + eng.replace(/\s+/g,'-'));
    if (!el) return;
    const pct = d.total > 0 ? Math.round((d.completed/d.total)*100) : 0;
    el.textContent = pct + '%';
    el.style.background = pct >= 80 ? 'rgba(16,185,129,0.25)' : pct >= 50 ? 'rgba(245,158,11,0.2)' : 'rgba(248,113,113,0.2)';
    el.style.color = pct >= 80 ? '#34d399' : pct >= 50 ? '#fbbf24' : '#f87171';
  });
}

// ── Fetch ─────────────────────────────────────────────────────────────────
async function fetchJobs() {
  let startStr, endStr;

  if (currentPeriod === 'prevdays') {
    // Single day — start and end are the same date
    const d = prevWorkingDays[currentDayIndex];
    startStr = fmtISO(d);
    endStr   = fmtISO(d);
  } else if (currentPeriod === 'specificMonth' && pickerMonth !== null) {
    const firstDay = new Date(pickerYear, pickerMonth, 1);
    const lastDay  = new Date(pickerYear, pickerMonth + 1, 0);
    startStr = fmtISO(firstDay);
    endStr   = fmtISO(lastDay);
  } else {
    const cfg   = periods[currentPeriod];
    const now   = new Date();
    const start = new Date(now);
    start.setDate(start.getDate() - cfg.daysBack);
    startStr = fmtISO(start);
    endStr   = fmtISO(now);
  }

  const q = query(
    collection(db, 'SP Submitted Data'),
    where('submissionDate', '>=', startStr),
    where('submissionDate', '<=', endStr),
    orderBy('submissionDate', 'asc')
  );
  const snap = await getDocs(q);
  return snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

function isCountable(job) { const s = (job.jobStatus || '').trim().toLowerCase(); return s === 'completed' || s === 'full abort'; }
function isCompleted(job) { return (job.jobStatus || '').trim().toLowerCase() === 'completed'; }
function getTeamLeader(job) { return teamMap[(job.outcomeResource || '').trim().toLowerCase()] || null; }

function filterJobs(jobs) {
  return jobs.filter(job => {
    const eng = (job.outcomeResource || '').trim().toLowerCase();
    if (!teamMap[eng]) return false;
    if (currentTeam !== 'all') { const tl = getTeamLeader(job); if (!tl || tl !== currentTeam) return false; }
    if (currentEngineer !== 'all') { if ((job.outcomeResource || '').trim() !== currentEngineer) return false; }
    if (currentJobType !== 'all') { if ((job.jobType || '') !== currentJobType) return false; }
    return true;
  });
}

function buildJobTypeToggles(jobs) {
  const types = [...new Set(jobs.map(j => j.jobType).filter(Boolean))].sort();
  const container = document.getElementById('jobTypeToggles');
  container.innerHTML = `<button class="type-toggle ${currentJobType==='all'?'active':''}" data-type="all">All Job Types</button>` +
    types.map(t => `<button class="type-toggle ${currentJobType===t?'active':''}" data-type="${esc(t)}">${esc(t)}</button>`).join('');
  container.querySelectorAll('.type-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      container.querySelectorAll('.type-toggle').forEach(b => b.classList.remove('active'));
      btn.classList.add('active'); currentJobType = btn.dataset.type; refresh();
    });
  });
}

// ── Aggregate ─────────────────────────────────────────────────────────────
function aggregateForChart(jobs) {
  // Single day view — show by engineer
  if (currentPeriod === 'prevdays') {
    const byEng = {};
    jobs.forEach(j => {
      const eng = (j.outcomeResource || 'Unknown').trim();
      if (!byEng[eng]) byEng[eng] = { total: 0, completed: 0 };
      if (isCountable(j)) { byEng[eng].total++; if (isCompleted(j)) byEng[eng].completed++; }
    });
    const sorted = Object.entries(byEng).sort((a,b) => b[1].total - a[1].total);
    return {
      labels:    sorted.map(([eng]) => eng),
      totals:    sorted.map(([,d]) => d.total),
      completed: sorted.map(([,d]) => d.completed),
      chartType: 'bar',
    };
  }

  // Specific month: day-by-day
  if (currentPeriod === 'specificMonth' && pickerMonth !== null) {
    const firstDay = new Date(pickerYear, pickerMonth, 1);
    const lastDay  = new Date(pickerYear, pickerMonth + 1, 0);
    const days = []; const cur = new Date(firstDay);
    while (cur <= lastDay) { days.push(fmtISO(cur)); cur.setDate(cur.getDate() + 1); }
    const map = {};
    days.forEach(d => map[d] = { total: 0, completed: 0 });
    jobs.forEach(j => { if (map[j.submissionDate]) { if (isCountable(j)) { map[j.submissionDate].total++; if (isCompleted(j)) map[j.submissionDate].completed++; } } });
    return {
      labels:    days.map(d => { const dt = new Date(d); return [`${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}`, dt.toLocaleDateString('en-GB',{weekday:'short'})]; }),
      totals:    days.map(d => map[d].total),
      completed: days.map(d => map[d].completed),
      chartType: 'bar',
    };
  }

  const cfg   = periods[currentPeriod];
  const now   = new Date();
  const start = new Date(now);
  start.setDate(start.getDate() - cfg.daysBack);

  if (cfg.groupBy === 'month') {
    const map = {}; const keys = [];
    for (let i = 5; i >= 0; i--) {
      const d   = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      map[key]  = { label: d.toLocaleDateString('en-GB', { month:'short', year:'numeric' }), total: 0, completed: 0 };
      keys.push(key);
    }
    jobs.forEach(j => { const k = (j.submissionDate||'').substring(0,7); if (map[k]) { if (isCountable(j)) { map[k].total++; if (isCompleted(j)) map[k].completed++; } } });
    return { labels: keys.map(k=>map[k].label), totals: keys.map(k=>map[k].total), completed: keys.map(k=>map[k].completed), chartType: cfg.chartType };
  }

  if (cfg.groupBy === 'week') {
    const map = {}; const keys = [];
    const cur = new Date(start);
    while (cur <= now) {
      const key = fmtISO(cur);
      map[key]  = { label: cur.toLocaleDateString('en-GB',{day:'2-digit',month:'short'}), total: 0, completed: 0 };
      keys.push(key); cur.setDate(cur.getDate()+7);
    }
    jobs.forEach(j => {
      let best = keys[0];
      for (const k of keys) { if (k <= j.submissionDate) best = k; else break; }
      if (map[best]) { if (isCountable(j)) { map[best].total++; if (isCompleted(j)) map[best].completed++; } }
    });
    return { labels: keys.map(k=>map[k].label), totals: keys.map(k=>map[k].total), completed: keys.map(k=>map[k].completed), chartType: cfg.chartType };
  }

  // By day (weekdays)
  const days = []; const cur = new Date(start);
  while (cur <= now) { const day = cur.getDay(); if (day!==0&&day!==6) days.push(fmtISO(cur)); cur.setDate(cur.getDate()+1); }
  const map = {};
  days.forEach(d => map[d] = { total: 0, completed: 0 });
  jobs.forEach(j => { if (map[j.submissionDate]) { if (isCountable(j)) { map[j.submissionDate].total++; if (isCompleted(j)) map[j.submissionDate].completed++; } } });
  return {
    labels:    days.map(d => { const dt = new Date(d); return [`${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}`, dt.toLocaleDateString('en-GB',{weekday:'short'})]; }),
    totals:    days.map(d=>map[d].total),
    completed: days.map(d=>map[d].completed),
    chartType: cfg.chartType,
  };
}

function drawChart(data) {
  const container = document.getElementById('chartContainer');
  container.querySelectorAll('.overlay').forEach(el => el.remove());
  if (!container.contains(canvas)) container.appendChild(canvas);
  if (chart) chart.destroy();

  chart = new Chart(canvas, {
    type: data.chartType,
    data: {
      labels: data.labels,
      datasets: [
        { label: 'Total Jobs', data: data.totals, backgroundColor: 'rgba(96,165,250,0.6)', borderColor: '#60a5fa', borderWidth: data.chartType==='bar'?1:2, borderRadius: data.chartType==='bar'?6:0, tension: 0.35, fill: data.chartType==='line', pointRadius: data.chartType==='line'?3:0, order: 2 },
        { label: 'Completed',  data: data.completed, backgroundColor: 'rgba(16,185,129,0.75)', borderColor: '#10b981', borderWidth: data.chartType==='bar'?1:2, borderRadius: data.chartType==='bar'?6:0, tension: 0.35, fill: data.chartType==='line', pointRadius: data.chartType==='line'?3:0, order: 1 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#cbd5e1', font: { size: 13 } } },
        tooltip: { callbacks: { afterBody: (items) => { const total=items.find(i=>i.dataset.label==='Total Jobs')?.raw||0; const done=items.find(i=>i.dataset.label==='Completed')?.raw||0; return [`Completion: ${total>0?((done/total)*100).toFixed(1):0}%`]; } } },
        datalabels: data.chartType==='bar' ? { anchor:'end', align:'top', offset:2, color:'#e2e8f0', font:{weight:'bold',size:11}, formatter: v=>v>0?v:'', textShadowColor:'rgba(0,0,0,0.8)', textShadowBlur:3 } : false,
      },
      scales: {
        x: { ticks: { color:'#94a3b8', font:{size:11}, padding:6 }, grid:{color:'#334155'} },
        y: { beginAtZero:true, ticks:{color:'#94a3b8',stepSize:1}, grid:{color:'#334155'} }
      }
    },
    plugins: [ChartDataLabels]
  });
}

function buildBreakdown(jobs) {
  const byEngineer = {};
  jobs.forEach(j => {
    const eng = (j.outcomeResource||'Unknown').trim();
    if (!byEngineer[eng]) byEngineer[eng] = { total:0, completed:0, types:new Set() };
    if (isCountable(j)) { byEngineer[eng].total++; if (isCompleted(j)) byEngineer[eng].completed++; }
    if (j.jobType) byEngineer[eng].types.add(j.jobType);
  });
  const rows = Object.entries(byEngineer).sort((a,b)=>b[1].total-a[1].total);
  const body = document.getElementById('breakdownBody');
  if (!rows.length) { body.innerHTML='<tr><td colspan="6" class="empty-table">No data for this period</td></tr>'; return; }
  body.innerHTML = rows.map(([eng, d]) => {
    const tl  = teamMap[eng.toLowerCase()] || '<span style="color:var(--text-dim)">&#8212;</span>';
    const pct = d.total>0?((d.completed/d.total)*100).toFixed(1):0;
    const pctColor = pct>=80?'badge-green':pct>=50?'badge-amber':'badge-blue';
    const types = [...d.types].map(t=>`<span class="badge badge-blue">${esc(t)}</span>`).join(' ');
    return `<tr><td><strong>${esc(eng)}</strong></td><td>${tl}</td><td>${d.total}</td><td>${d.completed}</td><td><span class="badge ${pctColor}">${pct}%</span></td><td>${types||'&#8212;'}</td></tr>`;
  }).join('');
}

function updateStats(jobs) {
  const total=jobs.filter(isCountable).length, completed=jobs.filter(isCompleted).length;
  const pct=total>0?((completed/total)*100).toFixed(1):0;
  const engineers=new Set(jobs.map(j=>j.outcomeResource).filter(Boolean)).size;
  document.getElementById('stat-total').textContent=total;
  document.getElementById('stat-completed').textContent=completed;
  document.getElementById('stat-pct').textContent=`${pct}%`;
  document.getElementById('stat-engineers').textContent=engineers;
}

function updateSubtitle() {
  const teamLabel = currentTeam==='all'?'All Teams':currentTeam;
  const typeLabel = currentJobType==='all'?'All Job Types':currentJobType;
  let periodLabel;
  if (currentPeriod === 'prevdays') {
    const d = prevWorkingDays[currentDayIndex];
    periodLabel = fmtLong(d);
  } else if (currentPeriod === 'specificMonth' && pickerMonth !== null) {
    periodLabel = `${MONTH_NAMES[pickerMonth]} ${pickerYear}`;
  } else {
    periodLabel = periods[currentPeriod]?.label || '';
  }
  document.getElementById('subtitle').textContent = `${teamLabel} · ${typeLabel} · ${periodLabel}`;
  document.getElementById('chartTitle').textContent = currentPeriod === 'prevdays'
    ? `Jobs by Engineer — ${fmtLong(prevWorkingDays[currentDayIndex])}`
    : `Jobs Over Time — ${periodLabel}`;
}

async function refresh() {
  if (currentPeriod === 'specificMonth' && pickerMonth === null) return;

  const container = document.getElementById('chartContainer');
  let overlay = container.querySelector('.overlay');
  if (!overlay) { overlay = document.createElement('div'); overlay.className='overlay'; container.appendChild(overlay); }
  overlay.innerHTML = '<div class="spinner-sm"></div><span>Loading…</span>';
  updateSubtitle();

  try {
    const rawJobs   = await fetchJobs();
    buildJobTypeToggles(rawJobs);
    const filtered  = filterJobs(rawJobs);
    const chartData = aggregateForChart(filtered);
    updateStats(filtered);
    drawChart(chartData);
    buildBreakdown(filtered);
    const teamFiltered = rawJobs.filter(job => {
      const eng = (job.outcomeResource||'').trim().toLowerCase();
      if (!teamMap[eng]) return false;
      if (currentTeam !== 'all') { const tl=getTeamLeader(job); if (!tl||tl!==currentTeam) return false; }
      return true;
    });
    updateEngineerBadges(teamFiltered);
  } catch(e) {
    console.error(e);
    container.querySelectorAll('.overlay').forEach(el=>el.remove());
    const err = document.createElement('div');
    err.className='overlay error';
    err.innerHTML=`⚠️ ${esc(e.message)}<br><small>Check console for details</small>`;
    container.appendChild(err);
  }
}

// ── Period buttons ────────────────────────────────────────────────────────
document.querySelectorAll('.period-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentPeriod = btn.dataset.period;

    const picker  = document.getElementById('monthPicker');
    const dayPills = document.getElementById('dayPills');

    if (currentPeriod === 'specificMonth') {
      picker.classList.add('visible');
      dayPills.classList.remove('visible');
      if (pickerMonth === null) { pickerYear = TODAY.getFullYear(); pickerMonth = TODAY.getMonth(); document.getElementById('yearLabel').textContent = pickerYear; renderMonthGrid(); }
    } else if (currentPeriod === 'prevdays') {
      picker.classList.remove('visible');
      dayPills.classList.add('visible');
      // Default to most recent day
      currentDayIndex = 0;
      buildDayPills();
    } else {
      picker.classList.remove('visible');
      dayPills.classList.remove('visible');
    }

    refresh();
  });
});

document.querySelector('.team-btn[data-team="all"]').addEventListener('click', function() {
  document.querySelectorAll('.team-btn, .eng-btn').forEach(b => b.classList.remove('active','expanded'));
  document.querySelectorAll('.engineer-list').forEach(l => l.classList.remove('open'));
  this.classList.add('active');
  currentTeam='all'; currentEngineer='all';
  refresh();
});

function esc(t) { const d=document.createElement('div'); d.textContent=String(t??'boom'); return d.innerHTML; }

buildDayPills();
await loadTeamLeaders();
refresh();
</script>
