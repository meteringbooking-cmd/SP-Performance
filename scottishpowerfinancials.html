<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scottish Power - Performance Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #005EB8; --accent: #00A3E0; --bg-dark: #0A1628; --bg-card: #1a2942;
            --bg-input: #0d1f3a; --text-light: #E8EDF2; --text-muted: #8B9AAE;
            --border: #2a3f5f; --success: #10B981; --warning: #F59E0B; --error: #EF4444;
            --purple: #8B5CF6; --teal: #14b8a6;
            --highlight-orange: rgba(245, 158, 11, 0.15); /* Faint orange highlight */
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Work Sans', sans-serif; background: var(--bg-dark); color: var(--text-light); min-height: 100vh; }
        .page { max-width: 1600px; margin: 0 auto; padding: 2rem; }
        header { margin-bottom: 2rem; }
        h1 { font-size: 2rem; font-weight: 700; background: linear-gradient(135deg, #fff 0%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .page-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
        .ptab { padding: 0.7rem 1.5rem; border-radius: 10px; border: 2px solid var(--border); background: var(--bg-card); color: var(--text-muted); font-weight: 600; cursor: pointer; transition: 0.2s; }
        .ptab.active { border-color: var(--accent); color: var(--accent); background: rgba(0, 163, 224, 0.08); }

        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem; }
        .card-title { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.6rem; }
        .card-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        .form-group { display: flex; flex-direction: column; margin-bottom: 1rem; }
        input, textarea { background: var(--bg-input); border: 2px solid var(--border); border-radius: 10px; color: #fff; padding: 0.75rem; font-family: inherit; }

        .engineers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .eng-card { background: var(--bg-dark); border: 2px solid var(--border); border-radius: 12px; padding: 1rem; }
        .eng-card.has-value { border-color: var(--accent); }
        .eng-card.highlight-orange { background: var(--highlight-orange); border-color: var(--warning); }
        
        .eng-input-wrap { position: relative; }
        .eng-input-wrap::before { content: '£'; position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-family: 'DM Mono'; }
        .eng-input { width: 100%; padding-left: 1.8rem; font-family: 'DM Mono'; font-size: 1.1rem; }

        .btn { padding: 0.8rem 1.5rem; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: var(--bg-dark); color: var(--text-light); border: 1px solid var(--border); }

        /* Pivot Table Styling */
        .matrix-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); }
        .matrix-table { width: 100%; border-collapse: collapse; background: var(--bg-dark); font-size: 0.85rem; }
        .matrix-table th, .matrix-table td { padding: 0.75rem; border: 1px solid var(--border); text-align: center; }
        .matrix-table th { background: var(--bg-card); color: var(--text-muted); font-weight: 600; }
        .name-col { text-align: left !important; font-weight: 600; background: var(--bg-card) !important; position: sticky; left: 0; z-index: 2; }
        .type-header { background: #0d1f3a !important; text-align: left !important; color: var(--accent); font-weight: 700; letter-spacing: 1px; }
        
        /* Highlighting Logic */
        .val-low { color: var(--error); font-weight: 700; }
        .val-good { color: var(--success); }
        .val-empty { color: #2a3f5f; }
        .row-highlight { background-color: var(--highlight-orange) !important; }

        .averages-strip { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1rem; }
        .avg-card { background: var(--bg-dark); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; }
        .avg-card.highlight-orange { background: var(--highlight-orange); border-color: var(--warning); }
        .avg-value { font-family: 'DM Mono'; font-size: 1.3rem; color: var(--accent); }

        .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: var(--bg-card); border-left: 4px solid var(--success); padding: 1rem 2rem; border-radius: 8px; display: none; z-index: 999; }
    </style>
</head>
<body>

<div class="page">
    <header>
        <h1>Financial Dashboard</h1>
        <p class="subtitle">SCOTTISH POWER · PERFORMANCE OVERSIGHT</p>
    </header>

    <div class="page-tabs">
        <button class="ptab active" onclick="switchTab('entry')" id="tab-entry">📥 Data Entry</button>
        <button class="ptab" onclick="switchTab('overview')" id="tab-overview">📊 Overview & Pivot</button>
    </div>

    <div id="panel-entry">
        <div class="card">
            <div class="card-title">📅 Date Selection</div>
            <div class="form-group" style="width: 200px;">
                <input type="date" id="entryDate" onchange="loadDateData()">
            </div>

            <div style="margin-top:1.5rem; padding:1rem; border:1px dashed var(--accent); border-radius:12px; background:rgba(0,163,224,0.03);">
                <div class="card-title" style="margin-bottom:0.5rem; border:none;">📋 Spreadsheet Paste</div>
                <textarea id="bulkPaste" style="height:60px; width:100%; margin-bottom:10px; font-size:0.8rem;" placeholder="Alistair Cavan	450.00"></textarea>
                <button class="btn btn-secondary" onclick="processBulk()" style="width:100%; font-size:0.8rem;">Process Bulk Entry</button>
            </div>

            <hr style="margin:2rem 0; border:none; border-top:1px solid var(--border);">

            <div class="card-title" style="color:var(--purple)">⚡ Transactional</div>
            <div class="engineers-grid" id="grid-transactional"></div>

            <div class="card-title" style="color:var(--teal)">📅 Day Rate</div>
            <div class="engineers-grid" id="grid-dayrate"></div>

            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:2rem;">
                <div style="font-family:'DM Mono';">Daily Total: <span id="totalDisplay" style="color:var(--success); font-size:1.5rem; font-weight:600;">£0.00</span></div>
                <button class="btn btn-primary" id="saveBtn" onclick="saveData()">💾 Save Entries</button>
            </div>
        </div>
    </div>

    <div id="panel-overview" style="display:none;">
        <div class="card">
            <div class="card-title">⏱ Filter Range</div>
            <div style="display:flex; gap:1rem; align-items:flex-end; flex-wrap:wrap;">
                <div class="form-group"><label>Start Date</label><input type="date" id="ovStart"></div>
                <div class="form-group"><label>End Date</label><input type="date" id="ovEnd"></div>
                <button class="btn btn-primary" onclick="generateReport()">Generate Pivot Report</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title">📈 Averages (Active Days Only)</div>
            <div id="averages-container" class="averages-strip"></div>
        </div>

        <div class="card">
            <div class="card-title">📆 Daily Revenue Pivot Table</div>
            <div class="matrix-wrap" id="matrix-container">
                <div style="padding: 2rem; text-align: center; color: var(--text-muted);">Select dates and click Generate.</div>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="toast">Action Successful</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, getDocs, collection, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCMmUOdW2uEIGVd6XQfWXKF8eaFmwEog1g",
        authDomain: "oesperformance-a54c0.firebaseapp.com",
        projectId: "oesperformance-a54c0",
        storageBucket: "oesperformance-a54c0.firebasestorage.app",
        messagingSenderId: "484894102454",
        appId: "1:484894102454:web:17535ee497eac2d90d6717"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const TRANSACTIONAL = ["Alistair Cavan", "Craig Steel", "Jonathan Chyla", "Mehdi Khamseh", "Muhammed Zafar", "Neil Burns", "Tomas Anderson"].sort();
    const DAYRATE = ["Allan Grant", "Harris Saleem", "Kris Armstrong", "Ryan Clark", "Scott Coyle"].sort();
    
    // Highlight List
    const HIGHLIGHT_LIST = ["Allan Grant", "Harris Saleem", "Kris Armstrong", "Ryan Clark", "Scott Coyle"];

    function init() {
        const tGrid = document.getElementById('grid-transactional');
        const dGrid = document.getElementById('grid-dayrate');
        TRANSACTIONAL.forEach(n => tGrid.innerHTML += createCard(n, 'transactional'));
        DAYRATE.forEach(n => dGrid.innerHTML += createCard(n, 'dayrate'));
        
        document.getElementById('entryDate').value = new Date().toISOString().split('T')[0];
        loadDateData();
    }

    function createCard(name, type) {
        const id = name.replace(/\s+/g, '-').toLowerCase();
        const highlightClass = HIGHLIGHT_LIST.includes(name) ? 'highlight-orange' : '';
        return `
            <div class="eng-card ${highlightClass}" id="card-${id}">
                <div class="eng-header"><span class="eng-name">${name}</span></div>
                <div class="eng-input-wrap">
                    <input type="number" step="0.01" class="eng-input" id="input-${id}" data-name="${name}" data-type="${type}" oninput="calcTotal()">
                </div>
            </div>`;
    }

    window.calcTotal = () => {
        let total = 0;
        document.querySelectorAll('.eng-input').forEach(input => {
            const val = parseFloat(input.value) || 0;
            total += val;
            const id = input.id.replace('input-', '');
            val > 0 ? document.getElementById('card-'+id).classList.add('has-value') : document.getElementById('card-'+id).classList.remove('has-value');
        });
        document.getElementById('totalDisplay').innerText = `£${total.toFixed(2)}`;
    };

    window.processBulk = () => {
        const lines = document.getElementById('bulkPaste').value.split('\n');
        lines.forEach(line => {
            const parts = line.split('\t');
            if (parts.length >= 2) {
                const id = parts[0].trim().replace(/\s+/g, '-').toLowerCase();
                const input = document.getElementById('input-' + id);
                if (input) input.value = parseFloat(parts[1].replace(/[£,]/g, '')).toFixed(2);
            }
        });
        calcTotal();
        document.getElementById('bulkPaste').value = '';
    };

    window.saveData = async () => {
        const date = document.getElementById('entryDate').value;
        const entries = [];
        document.querySelectorAll('.eng-input').forEach(i => {
            if (parseFloat(i.value) > 0) entries.push({ name: i.dataset.name, type: i.dataset.type, amount: parseFloat(i.value) });
        });
        await setDoc(doc(db, "SP Financial", date), { date, entries });
        showToast("Entries Saved");
    };

    window.loadDateData = async () => {
        const date = document.getElementById('entryDate').value;
        document.querySelectorAll('.eng-input').forEach(i => i.value = '');
        const snap = await getDoc(doc(db, "SP Financial", date));
        if (snap.exists()) {
            snap.data().entries.forEach(e => {
                const input = document.getElementById('input-' + e.name.replace(/\s+/g, '-').toLowerCase());
                if (input) input.value = e.amount;
            });
        }
        calcTotal();
    };

    window.generateReport = async () => {
        const start = document.getElementById('ovStart').value;
        const end = document.getElementById('ovEnd').value;
        if (!start || !end) return;

        const q = query(collection(db, "SP Financial"), where("date", ">=", start), where("date", "<=", end));
        const snap = await getDocs(q);
        
        const dataMap = {}; 
        const dates = [];
        const engStats = {};

        snap.forEach(doc => {
            const d = doc.data();
            dates.push(d.date);
            dataMap[d.date] = {};
            d.entries.forEach(e => {
                dataMap[d.date][e.name] = e.amount;
                if (!engStats[e.name]) engStats[e.name] = { total: 0, count: 0 };
                if (e.amount > 0) { engStats[e.name].total += e.amount; engStats[e.name].count++; }
            });
        });

        dates.sort();
        renderPivot(dates, dataMap);
        renderAverages(engStats);
    };

    function renderPivot(dates, dataMap) {
        let html = `<table class="matrix-table"><thead><tr><th class="name-col">Engineer Name</th>`;
        dates.forEach(d => html += `<th>${d.split('-').slice(1).reverse().join('/')}</th>`);
        html += `</tr></thead><tbody>`;

        const renderSection = (title, list) => {
            html += `<tr><td colspan="${dates.length + 1}" class="type-header">${title}</td></tr>`;
            list.forEach(name => {
                const isHighlighted = HIGHLIGHT_LIST.includes(name);
                const rowClass = isHighlighted ? 'class="row-highlight"' : '';
                
                html += `<tr ${rowClass}><td class="name-col ${isHighlighted ? 'row-highlight' : ''}">${name}</td>`;
                dates.forEach(d => {
                    const val = dataMap[d] ? (dataMap[d][name] || 0) : 0;
                    let style = '';
                    if (val > 0 && val < 400) style = 'class="val-low"';
                    else if (val >= 400) style = 'class="val-good"';
                    else style = 'class="val-empty"';
                    html += `<td ${style}>${val > 0 ? '£' + val.toFixed(0) : '-'}</td>`;
                });
                html += `</tr>`;
            });
        };

        renderSection('⚡ TRANSACTIONAL', TRANSACTIONAL);
        renderSection('📅 DAY RATE', DAYRATE);
        
        html += `</tbody></table>`;
        document.getElementById('matrix-container').innerHTML = html;
    }

    function renderAverages(stats) {
        const container = document.getElementById('averages-container');
        container.innerHTML = '';
        Object.keys(stats).sort().forEach(name => {
            const s = stats[name];
            if (s.count > 0) {
                const isHighlighted = HIGHLIGHT_LIST.includes(name);
                container.innerHTML += `
                    <div class="avg-card ${isHighlighted ? 'highlight-orange' : ''}">
                        <div style="font-size:0.7rem; color:var(--text-muted)">${name}</div>
                        <div class="avg-value">£${(s.total/s.count).toFixed(2)}</div>
                        <div style="font-size:0.6rem">Avg over ${s.count} active days</div>
                    </div>`;
            }
        });
    }

    window.switchTab = (t) => {
        document.getElementById('panel-entry').style.display = t === 'entry' ? 'block' : 'none';
        document.getElementById('panel-overview').style.display = t === 'overview' ? 'block' : 'none';
        document.querySelectorAll('.ptab').forEach(b => b.classList.toggle('active', b.id === 'tab-'+t));
    };

    function showToast(m) {
        const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    init();
</script>
</body>
</html>
